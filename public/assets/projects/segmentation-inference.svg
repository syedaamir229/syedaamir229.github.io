  <!-- Shared feature store -->
  <rect x="24" y="175" width="150" height="120" rx="8" fill="#122033"/>
  <text x="99" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Shared</text>
  <text x="99" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Feature Store</text>
  <text x="99" y="251" text-anchor="middle" font-size="9" fill="#06B6D4">Profile-level</text>
  <text x="99" y="266" text-anchor="middle" font-size="9" fill="#06B6D4">features</text>

  <line x1="174" y1="210" x2="210" y2="142" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>
  <line x1="174" y1="262" x2="210" y2="352" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>

  <!-- TOP: segmentation branch -->
  <rect x="214" y="100" width="150" height="86" rx="8" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
