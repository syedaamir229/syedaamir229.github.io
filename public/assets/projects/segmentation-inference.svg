  <text x="289" y="364" text-anchor="middle" font-size="8" fill="#94A3B8">single-user accounts</text>
  <text x="289" y="382" text-anchor="middle" font-size="8" fill="#94A3B8">self-labeled</text>

  <line x1="364" y1="360" x2="394" y2="360" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>

