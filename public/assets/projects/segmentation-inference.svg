  <text x="289" y="168" text-anchor="middle" font-size="9" fill="#E2E8F0">+ Embeddings</text>

  <line x1="364" y1="143" x2="394" y2="143" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>

  <rect x="398" y="110" width="104" height="66" rx="8" fill="#122033"/>
