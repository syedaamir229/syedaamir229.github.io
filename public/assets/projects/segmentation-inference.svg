  <text x="450" y="157" text-anchor="middle" font-size="9" fill="#06B6D4">clustering</text>

  <line x1="502" y1="143" x2="532" y2="143" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>

  <rect x="536" y="110" width="120" height="66" rx="8" fill="#122033"/>
  <text x="596" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#E2E8F0">Stability</text>
