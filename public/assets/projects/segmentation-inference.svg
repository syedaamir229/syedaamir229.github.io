  <text x="596" y="167" text-anchor="middle" font-size="8" fill="#94A3B8">+ labels</text>

  <line x1="656" y1="143" x2="686" y2="143" stroke-width="2" marker-end="url(#arr)" stroke="#06B6D4"/>

  <rect x="690" y="110" width="166" height="66" rx="8" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="773" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#06B6D4">Labeled Segments</text>
  <text x="773" y="152" text-anchor="middle" font-size="8" fill="#94A3B8">→ Semantic Layer</text>
  <text x="773" y="168" text-anchor="middle" font-size="8" fill="#94A3B8">for activation</text>

  <!-- BOTTOM: inference branch -->
  <rect x="214" y="320" width="150" height="80" rx="8" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
