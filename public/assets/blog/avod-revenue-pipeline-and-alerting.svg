<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-avod" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arrow-avod-dashed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1020" height="440" rx="12" fill="#050B14"/>
  <text x="510" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">The Four-Signal AVOD Operating Loop</text>
  <text x="510" y="54" text-anchor="middle" font-size="11" fill="#94A3B8">Ad Operations reads the signals. Content Operations moves the inventory lever when signals say pressure.</text>

  <rect x="30" y="80" width="230" height="110" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="46" y="104" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">SIGNAL 1</text>
  <text x="46" y="128" font-size="13" font-weight="700" fill="#E2E8F0">Inventory</text>
  <text x="46" y="152" font-size="10" fill="#E2E8F0">Sellable ad slots by</text>
  <text x="46" y="166" font-size="10" fill="#E2E8F0">format, content, country.</text>
  <text x="46" y="182" font-size="9" fill="#94A3B8">Supply-side view</text>

  <rect x="280" y="80" width="230" height="110" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="296" y="104" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">SIGNAL 2</text>
  <text x="296" y="128" font-size="13" font-weight="700" fill="#E2E8F0">Impressions</text>
  <text x="296" y="152" font-size="10" fill="#E2E8F0">Delivered ads and</text>
  <text x="296" y="166" font-size="10" fill="#E2E8F0">revenue earned.</text>
  <text x="296" y="182" font-size="9" fill="#94A3B8">Two-schedule refresh</text>

  <rect x="530" y="80" width="230" height="110" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="546" y="104" font-size="10" font-weight="700" fill="#06B6D4" font-family="JetBrains Mono, monospace">SIGNAL 3</text>
  <text x="546" y="128" font-size="13" font-weight="700" fill="#E2E8F0">Delivery Pacing</text>
  <text x="546" y="152" font-size="10" fill="#E2E8F0">Delivery vs booked</text>
  <text x="546" y="166" font-size="10" fill="#E2E8F0">commitment.</text>
  <text x="546" y="182" font-size="9" fill="#22D3EE">Alerts 3 days before flight end</text>

  <rect x="780" y="80" width="230" height="110" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="796" y="104" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">SIGNAL 4</text>
  <text x="796" y="128" font-size="13" font-weight="700" fill="#E2E8F0">VAST Errors</text>
  <text x="796" y="152" font-size="10" fill="#E2E8F0">Video-ad serving</text>
  <text x="796" y="166" font-size="10" fill="#E2E8F0">failures by category.</text>
  <text x="796" y="182" font-size="9" fill="#94A3B8">Sub-daily alerts</text>

  <g stroke="#06B6D4" stroke-width="2">
    <line x1="145" y1="190" x2="145" y2="226" marker-end="url(#arrow-avod)"/>
    <line x1="395" y1="190" x2="395" y2="226" marker-end="url(#arrow-avod)"/>
    <line x1="645" y1="190" x2="645" y2="226" marker-end="url(#arrow-avod)"/>
    <line x1="895" y1="190" x2="895" y2="226" marker-end="url(#arrow-avod)"/>
  </g>

  <rect x="30" y="230" width="980" height="86" rx="10" fill="#122033" stroke="#06B6D4" stroke-width="2"/>
  <text x="520" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">Ad Operations</text>
  <text x="520" y="280" text-anchor="middle" font-size="10" fill="#22D3EE">Acts on signals: redistribute inventory, adjust targeting, defend booked commitments,</text>
  <text x="520" y="296" text-anchor="middle" font-size="10" fill="#22D3EE">surface fill-rate erosion early, escalate when pressure builds</text>

  <line x1="520" y1="316" x2="520" y2="346" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-avod-dashed)"/>
  <text x="540" y="334" font-size="9" fill="#94A3B8" font-style="italic">escalate inventory pressure</text>

  <rect x="280" y="350" width="480" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="520" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">Content Operations</text>
  <text x="520" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">Moves the supply lever: add slots inside AVOD content, extend the AVOD-eligible footprint</text>
</svg>
