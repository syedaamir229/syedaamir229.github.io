<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-crm" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arrow-crm-loop" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="960" height="680" rx="12" fill="#050B14"/>
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">The Six-Layer CRM Operating System</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" fill="#94A3B8">Each layer is independent. Skipping one collapses the next.</text>

  <rect x="120" y="76" width="720" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="148" y="102" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">LAYER 6</text>
  <text x="148" y="126" font-size="14" font-weight="700" fill="#E2E8F0">Closed-loop performance</text>
  <text x="812" y="102" text-anchor="end" font-size="10" fill="#94A3B8">Campaign results feed back into the loop</text>
  <text x="812" y="126" text-anchor="end" font-size="10" fill="#94A3B8">Opens, conversions, opt-outs, sent-content log</text>

  <line x1="480" y1="176" x2="480" y2="154" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-crm)"/>

  <rect x="120" y="176" width="720" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="148" y="202" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">LAYER 5</text>
  <text x="148" y="226" font-size="14" font-weight="700" fill="#E2E8F0">CRM integration</text>
  <text x="812" y="202" text-anchor="end" font-size="10" fill="#94A3B8">Daily audience push to the engagement platform</text>
  <text x="812" y="226" text-anchor="end" font-size="10" fill="#94A3B8">Push and email share one audience payload</text>

  <line x1="480" y1="276" x2="480" y2="254" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-crm)"/>

  <rect x="120" y="276" width="720" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="148" y="302" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">LAYER 4</text>
  <text x="148" y="326" font-size="14" font-weight="700" fill="#E2E8F0">Behaviour-based prioritisation</text>
  <text x="812" y="302" text-anchor="end" font-size="10" fill="#94A3B8">Picks one scenario when several apply</text>
  <text x="812" y="326" text-anchor="end" font-size="10" fill="#94A3B8">Recency-aware: 7d, 8-30d, 30d+</text>

  <line x1="480" y1="376" x2="480" y2="354" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-crm)"/>

  <rect x="120" y="376" width="720" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="148" y="402" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">LAYER 3</text>
  <text x="148" y="426" font-size="14" font-weight="700" fill="#E2E8F0">Profile-to-account resolution</text>
  <text x="812" y="402" text-anchor="end" font-size="10" fill="#94A3B8">Profile-level scoring, account-level delivery</text>
  <text x="812" y="426" text-anchor="end" font-size="10" fill="#94A3B8">Primary / dominant / most-recent rollup</text>

  <line x1="480" y1="476" x2="480" y2="454" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-crm)"/>

  <rect x="120" y="476" width="720" height="68" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="148" y="502" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">LAYER 2</text>
  <text x="148" y="526" font-size="14" font-weight="700" fill="#E2E8F0">Scenario engine</text>
  <text x="812" y="502" text-anchor="end" font-size="10" fill="#94A3B8">Four reusable scenarios run in parallel</text>
  <text x="812" y="526" text-anchor="end" font-size="10" fill="#94A3B8">Cluster, re-engagement, trending, AVOD-tier</text>

  <line x1="480" y1="576" x2="480" y2="554" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-crm)"/>

  <rect x="120" y="576" width="720" height="68" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="148" y="602" font-size="11" font-weight="700" fill="#06B6D4" font-family="JetBrains Mono, monospace">LAYER 1 · Foundation</text>
  <text x="148" y="626" font-size="14" font-weight="700" fill="#06B6D4">Data foundation</text>
  <text x="812" y="602" text-anchor="end" font-size="10" fill="#22D3EE">Governed feature tables, lifecycle facts, cluster assignments</text>
  <text x="812" y="626" text-anchor="end" font-size="10" fill="#94A3B8">The contract everything else reads from</text>

  <path d="M 840 110 C 910 110, 910 610, 840 610" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-crm-loop)"/>
  <text x="900" y="360" font-size="9" fill="#94A3B8" font-style="italic" text-anchor="middle" transform="rotate(90 900 360)">closed loop refines Layer 1</text>
</svg>
