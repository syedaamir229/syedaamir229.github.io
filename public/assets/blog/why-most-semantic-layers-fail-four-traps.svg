<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-ft" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1020" height="380" rx="12" fill="#050B14"/>
  <text x="510" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">The Four Traps of Semantic Layer Programs</text>
  <text x="510" y="54" text-anchor="middle" font-size="11" fill="#94A3B8">Each trap can collapse a program on its own. Most failures hit two or three in sequence.</text>

  <!-- Trap 1 -->
  <rect x="20" y="80" width="230" height="200" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="36" y="106" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">TRAP 1</text>
  <text x="36" y="138" font-size="13" font-weight="700" fill="#E2E8F0">Engineering-First</text>
  <text x="36" y="156" font-size="13" font-weight="700" fill="#E2E8F0">Mistake</text>
  <text x="36" y="186" font-size="10" fill="#E2E8F0">Ship the model with no</text>
  <text x="36" y="200" font-size="10" fill="#E2E8F0">adoption plan.</text>
  <text x="36" y="230" font-size="10" fill="#94A3B8">A semantic layer that</text>
  <text x="36" y="244" font-size="10" fill="#94A3B8">ships without a metrics</text>
  <text x="36" y="258" font-size="10" fill="#94A3B8">product owner is a museum</text>
  <text x="36" y="272" font-size="10" fill="#94A3B8">exhibit.</text>

  <!-- Arrow 1 -->
  <line x1="250" y1="180" x2="270" y2="180" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-ft)"/>

  <!-- Trap 2 -->
  <rect x="270" y="80" width="230" height="200" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="286" y="106" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">TRAP 2</text>
  <text x="286" y="138" font-size="13" font-weight="700" fill="#E2E8F0">Big Bang</text>
  <text x="286" y="156" font-size="13" font-weight="700" fill="#E2E8F0">Migration</text>
  <text x="286" y="186" font-size="10" fill="#E2E8F0">18 months of build,</text>
  <text x="286" y="200" font-size="10" fill="#E2E8F0">zero benefit until the end.</text>
  <text x="286" y="230" font-size="10" fill="#94A3B8">Business attention has a</text>
  <text x="286" y="244" font-size="10" fill="#94A3B8">half-life. Sponsorship</text>
  <text x="286" y="258" font-size="10" fill="#94A3B8">fades before the dataset</text>
  <text x="286" y="272" font-size="10" fill="#94A3B8">is ready.</text>

  <!-- Arrow 2 -->
  <line x1="500" y1="180" x2="520" y2="180" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-ft)"/>

  <!-- Trap 3 -->
  <rect x="520" y="80" width="230" height="200" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="536" y="106" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">TRAP 3</text>
  <text x="536" y="138" font-size="13" font-weight="700" fill="#E2E8F0">Orphan KPI</text>
  <text x="536" y="156" font-size="13" font-weight="700" fill="#E2E8F0">Problem</text>
  <text x="536" y="186" font-size="10" fill="#E2E8F0">No per-domain ownership.</text>
  <text x="536" y="200" font-size="10" fill="#E2E8F0">Drift creeps back in.</text>
  <text x="536" y="230" font-size="10" fill="#94A3B8">A semantic layer without</text>
  <text x="536" y="244" font-size="10" fill="#94A3B8">metric stewards is a single</text>
  <text x="536" y="258" font-size="10" fill="#94A3B8">point of drift, not a single</text>
  <text x="536" y="272" font-size="10" fill="#94A3B8">source of truth.</text>

  <!-- Arrow 3 -->
  <line x1="750" y1="180" x2="770" y2="180" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow-ft)"/>

  <!-- Trap 4 -->
  <rect x="770" y="80" width="230" height="200" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="786" y="106" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">TRAP 4</text>
  <text x="786" y="138" font-size="13" font-weight="700" fill="#E2E8F0">Deployment</text>
  <text x="786" y="156" font-size="13" font-weight="700" fill="#E2E8F0">Cliff</text>
  <text x="786" y="186" font-size="10" fill="#E2E8F0">Retain-partitions flag</text>
  <text x="786" y="200" font-size="10" fill="#E2E8F0">unchecked, every fact</text>
  <text x="786" y="214" font-size="10" fill="#E2E8F0">table empty Saturday.</text>
  <text x="786" y="244" font-size="10" fill="#94A3B8">Whole layer unavailable</text>
  <text x="786" y="258" font-size="10" fill="#94A3B8">for a day. Business reports</text>
  <text x="786" y="272" font-size="10" fill="#94A3B8">anyway. Trust gone.</text>

  <!-- Call-out: Conflict-First Rollout -->
  <rect x="20" y="300" width="980" height="60" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="510" y="324" text-anchor="middle" font-size="12" font-weight="700" fill="#06B6D4">The Conflict-First Rollout breaks the pattern</text>
  <text x="510" y="346" text-anchor="middle" font-size="10" fill="#94A3B8">Six weeks. One analyst. A conflict matrix of the 20 KPIs that hurt the most. The rest of the program follows from that artefact.</text>
</svg>
