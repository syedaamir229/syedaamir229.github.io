<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 440" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-tr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arrow-tr-fail" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1020" height="440" rx="12" fill="#050B14"/>
  <text x="510" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">The Three Ways BI-to-DS Transitions Die</text>
  <text x="510" y="52" text-anchor="middle" font-size="11" fill="#94A3B8">Three failure modes that turn a six-month overlap into an abandonment.</text>

  <rect x="30" y="100" width="180" height="56" rx="10" fill="#122033" stroke="#2A4561"/>
  <text x="120" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">BI ownership</text>
  <text x="120" y="142" text-anchor="middle" font-size="10" fill="#94A3B8">Dashboards, metric trust</text>

  <rect x="270" y="100" width="480" height="56" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="2"/>
  <text x="510" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#06B6D4">Six-month overlap</text>
  <text x="510" y="142" text-anchor="middle" font-size="10" fill="#22D3EE">Both sides healthy. Shared entities. Verified activation.</text>

  <rect x="810" y="100" width="180" height="56" rx="10" fill="#122033" stroke="#2A4561"/>
  <text x="900" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">DS delivery</text>
  <text x="900" y="142" text-anchor="middle" font-size="10" fill="#94A3B8">Models with credibility intact</text>

  <line x1="210" y1="128" x2="270" y2="128" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-tr)"/>
  <line x1="750" y1="128" x2="810" y2="128" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrow-tr)"/>

  <line x1="370" y1="156" x2="180" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-tr-fail)"/>
  <rect x="30" y="226" width="300" height="180" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="46" y="252" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">FAILURE 1</text>
  <text x="46" y="276" font-size="13" font-weight="700" fill="#E2E8F0">Parallel ML data model</text>
  <text x="46" y="302" font-size="10" fill="#E2E8F0">DS creates its own subscriber</text>
  <text x="46" y="316" font-size="10" fill="#E2E8F0">table; model numbers disagree</text>
  <text x="46" y="330" font-size="10" fill="#E2E8F0">with BI dashboards.</text>
  <text x="46" y="354" font-size="9" fill="#22D3EE">Fix: shared entity definitions</text>
  <text x="46" y="368" font-size="9" fill="#22D3EE">from day one.</text>
  <text x="46" y="394" font-size="9" fill="#94A3B8" font-style="italic">Most common transition killer</text>

  <line x1="510" y1="156" x2="510" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-tr-fail)"/>
  <rect x="360" y="226" width="300" height="180" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="376" y="252" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">FAILURE 2</text>
  <text x="376" y="276" font-size="13" font-weight="700" fill="#E2E8F0">Dropping BI too early</text>
  <text x="376" y="302" font-size="10" fill="#E2E8F0">Dashboards stop being</text>
  <text x="376" y="316" font-size="10" fill="#E2E8F0">maintained; business loses</text>
  <text x="376" y="330" font-size="10" fill="#E2E8F0">confidence in the data function.</text>
  <text x="376" y="354" font-size="9" fill="#22D3EE">Fix: keep both sides healthy</text>
  <text x="376" y="368" font-size="9" fill="#22D3EE">through the six-month overlap.</text>
  <text x="376" y="394" font-size="9" fill="#94A3B8" font-style="italic">Feels productive while it happens</text>

  <line x1="650" y1="156" x2="840" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-tr-fail)"/>
  <rect x="690" y="226" width="300" height="180" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="706" y="252" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">FAILURE 3</text>
  <text x="706" y="276" font-size="13" font-weight="700" fill="#E2E8F0">Accuracy-only success metric</text>
  <text x="706" y="302" font-size="10" fill="#E2E8F0">Model passes AUC threshold</text>
  <text x="706" y="316" font-size="10" fill="#E2E8F0">but cannot be activated by the</text>
  <text x="706" y="330" font-size="10" fill="#E2E8F0">consuming system.</text>
  <text x="706" y="354" font-size="9" fill="#22D3EE">Fix: validate operational fit</text>
  <text x="706" y="368" font-size="9" fill="#22D3EE">alongside statistical performance.</text>
  <text x="706" y="394" font-size="9" fill="#94A3B8" font-style="italic">Hidden until handoff</text>
</svg>
