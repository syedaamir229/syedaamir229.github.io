<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-s4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="960" height="430" rx="12" fill="#050B14"/>
  <text x="480" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">Governance and Deployment Control Flow</text>

  <!-- Stage 1: Change Request (neutral entry point) -->
  <rect x="45" y="92" width="150" height="78" rx="9" fill="#0A1220" stroke="#2A4561"/>
  <text x="120" y="120" text-anchor="middle" font-size="10" fill="#E2E8F0">Change Request</text>
  <text x="120" y="138" text-anchor="middle" font-size="9" fill="#94A3B8">new KPI or logic update</text>

  <!-- Hero stages -->
  <rect x="235" y="92" width="150" height="78" rx="9" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="310" y="120" text-anchor="middle" font-size="10" fill="#06B6D4">Dev Model Update</text>
  <text x="310" y="138" text-anchor="middle" font-size="9" fill="#94A3B8">table, measure, role edits</text>

  <rect x="425" y="92" width="150" height="78" rx="9" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="500" y="120" text-anchor="middle" font-size="10" fill="#06B6D4">Validation Gate</text>
  <text x="500" y="138" text-anchor="middle" font-size="9" fill="#94A3B8">QA checks and peer review</text>

  <rect x="615" y="92" width="150" height="78" rx="9" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="690" y="120" text-anchor="middle" font-size="10" fill="#06B6D4">Deployment Wizard</text>
  <text x="690" y="138" text-anchor="middle" font-size="9" fill="#94A3B8">retain partitions and roles</text>

  <!-- Stage 5: Prod Model (neutral terminal) -->
  <rect x="805" y="92" width="110" height="78" rx="9" fill="#122033" stroke="#06B6D4" stroke-width="2"/>
  <text x="860" y="120" text-anchor="middle" font-size="10" fill="#E2E8F0">Prod Model</text>
  <text x="860" y="138" text-anchor="middle" font-size="9" fill="#06B6D4">published</text>

  <g stroke="#06B6D4">
    <line x1="195" y1="131" x2="235" y2="131" stroke-width="2.5" marker-end="url(#arrow-s4)"/>
    <line x1="385" y1="131" x2="425" y2="131" stroke-width="2.5" marker-end="url(#arrow-s4)"/>
    <line x1="575" y1="131" x2="615" y2="131" stroke-width="2.5" marker-end="url(#arrow-s4)"/>
    <line x1="765" y1="131" x2="805" y2="131" stroke-width="2.5" marker-end="url(#arrow-s4)"/>
  </g>

  <!-- Governance rules panel (neutral) -->
  <rect x="120" y="230" width="720" height="150" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="480" y="257" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Governance Rules That Prevent Reporting Drift</text>

  <g fill="#122033" stroke="#2A4561">
    <rect x="140" y="278" width="220" height="76" rx="8"/>
    <rect x="370" y="278" width="220" height="76" rx="8"/>
    <rect x="600" y="278" width="220" height="76" rx="8"/>
  </g>
  <g fill="#E2E8F0" font-size="9">
    <text x="156" y="301">1. Definition ownership by metric domain</text>
    <text x="156" y="317">2. Versioned change log per KPI</text>
    <text x="156" y="333">3. Mandatory validation checklist</text>
    <text x="386" y="301">4. Partition impact review per release</text>
    <text x="386" y="317">5. Security role review for access scope</text>
    <text x="386" y="333">6. Backout plan before deployment</text>
    <text x="616" y="301">7. Smoke test on high-value dashboards</text>
    <text x="616" y="317">8. Publish release note for business users</text>
    <text x="616" y="333">9. Confirm refresh completion post release</text>
  </g>
</svg>
