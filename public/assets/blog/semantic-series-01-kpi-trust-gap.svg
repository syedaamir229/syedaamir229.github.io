<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-s1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="920" height="420" rx="12" fill="#050B14"/>
  <text x="460" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">From KPI Conflicts to Trusted Metrics</text>

  <!-- Before -->
  <rect x="40" y="72" width="250" height="300" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="165" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Before Semantic Layer</text>

  <g fill="#122033" stroke="#2A4561">
    <rect x="58" y="116" width="214" height="56" rx="8"/>
    <rect x="58" y="186" width="214" height="56" rx="8"/>
    <rect x="58" y="256" width="214" height="56" rx="8"/>
  </g>
  <g font-size="10" fill="#E2E8F0">
    <text x="74" y="139">Marketing Report</text>
    <text x="74" y="209">Finance Report</text>
    <text x="74" y="279">Product Report</text>
  </g>
  <g font-size="9" fill="#94A3B8">
    <text x="74" y="154">churn_rate = lost_subs / active_subs</text>
    <text x="74" y="224">churn_rate = cancels / billed_base</text>
    <text x="74" y="294">churn_rate = profile_churn / viewers</text>
  </g>
  <text x="165" y="342" text-anchor="middle" font-size="10" fill="#94A3B8">Result: conflicting numbers and low trust</text>

  <line x1="290" y1="220" x2="365" y2="220" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-s1)"/>

  <!-- Hero: Semantic Layer -->
  <rect x="365" y="122" width="190" height="196" rx="10" fill="#122033" stroke="#06B6D4" stroke-width="2"/>
  <text x="460" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">Semantic Layer</text>
  <g fill="#0A1220" stroke="#06B6D4">
    <rect x="387" y="168" width="146" height="32" rx="6"/>
    <rect x="387" y="210" width="146" height="32" rx="6"/>
    <rect x="387" y="252" width="146" height="32" rx="6"/>
  </g>
  <g fill="#06B6D4" font-size="9" text-anchor="middle">
    <text x="460" y="188">Governed DAX Measures</text>
    <text x="460" y="230">Single KPI Definitions</text>
    <text x="460" y="272">Shared Time Logic</text>
  </g>

  <line x1="555" y1="220" x2="630" y2="220" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-s1)"/>

  <!-- After -->
  <rect x="630" y="72" width="250" height="300" rx="10" fill="rgba(6,182,212,0.06)" stroke="#2A4561"/>
  <text x="755" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">After Semantic Layer</text>
  <g fill="#122033" stroke="#2A4561">
    <rect x="648" y="116" width="214" height="56" rx="8"/>
    <rect x="648" y="186" width="214" height="56" rx="8"/>
    <rect x="648" y="256" width="214" height="56" rx="8"/>
  </g>
  <g font-size="10" fill="#E2E8F0">
    <text x="664" y="139">Marketing Dashboard</text>
    <text x="664" y="209">Finance Dashboard</text>
    <text x="664" y="279">Product Dashboard</text>
  </g>
  <g font-size="9" fill="#06B6D4">
    <text x="664" y="154">Uses governed churn_rate</text>
    <text x="664" y="224">Uses governed churn_rate</text>
    <text x="664" y="294">Uses governed churn_rate</text>
  </g>
  <text x="755" y="342" text-anchor="middle" font-size="10" fill="#06B6D4">Result: aligned metrics and faster decisions</text>
</svg>
