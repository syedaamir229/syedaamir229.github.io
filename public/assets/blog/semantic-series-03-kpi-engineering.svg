<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 420" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-s3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="1020" height="420" rx="12" fill="#050B14"/>
  <text x="510" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">KPI Engineering Stack in a Semantic Model</text>

  <!-- Base Measures -->
  <rect x="30" y="92" width="300" height="270" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="180" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Base Measures</text>
  <g fill="#122033" stroke="#2A4561">
    <rect x="50" y="136" width="260" height="34" rx="6"/>
    <rect x="50" y="180" width="260" height="34" rx="6"/>
    <rect x="50" y="224" width="260" height="34" rx="6"/>
    <rect x="50" y="268" width="260" height="34" rx="6"/>
  </g>
  <g fill="#E2E8F0" font-size="9">
    <text x="68" y="157">plays = SUM(fact_engagement[play_count])</text>
    <text x="68" y="201">watchers = DISTINCTCOUNT(subscriber_id)</text>
    <text x="68" y="245">revenue = SUM(fact_subscriptions[amount])</text>
    <text x="68" y="289">ad_fill_rate = DIVIDE(impressions, requests)</text>
  </g>

  <line x1="330" y1="226" x2="380" y2="226" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-s3)"/>

  <!-- Business Measures (hero) -->
  <rect x="380" y="72" width="300" height="310" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="530" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#06B6D4">Business Measures</text>
  <g fill="#122033" stroke="#06B6D4">
    <rect x="400" y="116" width="260" height="34" rx="6"/>
    <rect x="400" y="160" width="260" height="34" rx="6"/>
    <rect x="400" y="204" width="260" height="34" rx="6"/>
    <rect x="400" y="248" width="260" height="34" rx="6"/>
    <rect x="400" y="292" width="260" height="34" rx="6"/>
  </g>
  <g fill="#06B6D4" font-size="9">
    <text x="418" y="137">net_adds = new_subs - churned_subs</text>
    <text x="418" y="181">churn_rate = DIVIDE(churned, opening_base)</text>
    <text x="418" y="225">arpu = DIVIDE(revenue, avg_active_base)</text>
    <text x="418" y="269">retention = DIVIDE(retained, cohort_size)</text>
    <text x="418" y="313">engagement_index = weighted score</text>
  </g>

  <line x1="680" y1="226" x2="730" y2="226" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-s3)"/>

  <!-- Consumption Layer -->
  <rect x="730" y="92" width="260" height="270" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="860" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Consumption Layer</text>
  <g fill="#122033" stroke="#2A4561">
    <rect x="750" y="136" width="220" height="34" rx="6"/>
    <rect x="750" y="180" width="220" height="34" rx="6"/>
    <rect x="750" y="224" width="220" height="34" rx="6"/>
    <rect x="750" y="268" width="220" height="34" rx="6"/>
  </g>
  <g fill="#E2E8F0" font-size="9">
    <text x="768" y="157">time intelligence: MTD, QTD, YTD</text>
    <text x="768" y="201">lifecycle cuts: new, churned, reactivated</text>
    <text x="768" y="245">field parameters for self service</text>
    <text x="768" y="289">report templates with approved KPIs</text>
  </g>

  <text x="510" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">Measure logic is authored once and reused everywhere</text>
</svg>
