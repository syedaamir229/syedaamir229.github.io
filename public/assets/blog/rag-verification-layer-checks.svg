<svg viewBox="0 0 1600 820" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="820" fill="#050B14"/>

  <!-- Title -->
  <text x="40" y="56" fill="#E2E8F0" font-size="36" font-weight="700">The Verification Layer</text>
  <text x="40" y="92" fill="#94A3B8" font-size="19">The model's answer is the first draft. Four checks decide whether to trust it, each running at a different time.</text>

  <!-- Top flow: the first draft (the easy part) -->
  <rect x="40" y="140" width="170" height="70" rx="10" fill="#0A1220" stroke="#2A4561" stroke-width="1.5"/>
  <text x="125" y="182" fill="#94A3B8" font-size="18" text-anchor="middle">Question</text>

  <line x1="210" y1="175" x2="262" y2="175" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="264" y="140" width="170" height="70" rx="10" fill="#0A1220" stroke="#2A4561" stroke-width="1.5"/>
  <text x="349" y="182" fill="#94A3B8" font-size="18" text-anchor="middle">Retrieve</text>

  <line x1="434" y1="175" x2="486" y2="175" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="488" y="135" width="210" height="80" rx="10" fill="#122033" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="593" y="172" fill="#E2E8F0" font-size="20" font-weight="600" text-anchor="middle">Generate</text>
  <text x="593" y="196" fill="#94A3B8" font-size="14" text-anchor="middle">the first draft</text>

  <text x="40" y="128" fill="#94A3B8" font-size="13" letter-spacing="1.5">THE EASY PART</text>

  <!-- Arrow from Generate down into the layer -->
  <line x1="593" y1="215" x2="593" y2="288" stroke="#06B6D4" stroke-width="1.8" marker-end="url(#arrowCyan)"/>

  <!-- Trusted-answer output, top right -->
  <rect x="1190" y="135" width="370" height="80" rx="10" fill="#122033" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="1375" y="172" fill="#E2E8F0" font-size="20" font-weight="600" text-anchor="middle">An answer you can trust</text>
  <text x="1375" y="196" fill="#94A3B8" font-size="14" text-anchor="middle">or an honest refusal</text>
  <line x1="1540" y1="290" x2="1540" y2="217" stroke="#06B6D4" stroke-width="1.8" marker-end="url(#arrowCyan)"/>

  <!-- Verification Layer container -->
  <rect x="30" y="290" width="1540" height="330" rx="20" fill="rgba(6,182,212,0.06)" stroke="#2A4561" stroke-width="1.5"/>
  <text x="52" y="322" fill="#06B6D4" font-size="13" letter-spacing="2">AFTER GENERATE</text>

  <!-- Card 1 -->
  <rect x="56" y="338" width="338" height="232" rx="12" fill="#122033" stroke="#2A4561" stroke-width="1.5"/>
  <circle cx="96" cy="382" r="21" fill="#06B6D4"/>
  <text x="96" y="389" fill="#050B14" font-size="20" font-weight="700" text-anchor="middle">1</text>
  <text x="130" y="389" fill="#E2E8F0" font-size="21" font-weight="600">The cheap gate</text>
  <text x="80" y="430" fill="#06B6D4" font-size="12.5" letter-spacing="1.2">EVERY ANSWER &#183; REAL TIME</text>
  <text x="80" y="464" fill="#94A3B8" font-size="16">Is the answer backed by what</text>
  <text x="80" y="488" fill="#94A3B8" font-size="16">we retrieved? If not, refuse</text>
  <text x="80" y="512" fill="#94A3B8" font-size="16">rather than guess.</text>

  <line x1="398" y1="454" x2="430" y2="454" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Card 2 -->
  <rect x="434" y="338" width="338" height="232" rx="12" fill="#122033" stroke="#2A4561" stroke-width="1.5"/>
  <circle cx="474" cy="382" r="21" fill="#06B6D4"/>
  <text x="474" y="389" fill="#050B14" font-size="20" font-weight="700" text-anchor="middle">2</text>
  <text x="508" y="389" fill="#E2E8F0" font-size="21" font-weight="600">The second opinion</text>
  <text x="458" y="430" fill="#06B6D4" font-size="12.5" letter-spacing="1.2">DOUBTFUL ONLY &#183; REAL TIME</text>
  <text x="458" y="464" fill="#94A3B8" font-size="16">A slower, fuller read of</text>
  <text x="458" y="488" fill="#94A3B8" font-size="16">grounding, coherence and policy,</text>
  <text x="458" y="512" fill="#94A3B8" font-size="16">only where the gate hesitated.</text>

  <line x1="776" y1="454" x2="808" y2="454" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Card 3 -->
  <rect x="812" y="338" width="338" height="232" rx="12" fill="#122033" stroke="#2A4561" stroke-width="1.5"/>
  <circle cx="852" cy="382" r="21" fill="#06B6D4"/>
  <text x="852" y="389" fill="#050B14" font-size="20" font-weight="700" text-anchor="middle">3</text>
  <text x="886" y="389" fill="#E2E8F0" font-size="21" font-weight="600">The offline judge</text>
  <text x="836" y="430" fill="#06B6D4" font-size="12.5" letter-spacing="1.2">SAMPLED &#183; AFTER THE FACT</text>
  <text x="836" y="464" fill="#94A3B8" font-size="16">Reread a sample of yesterday's</text>
  <text x="836" y="488" fill="#94A3B8" font-size="16">answers to catch slow drift</text>
  <text x="836" y="512" fill="#94A3B8" font-size="16">the live checks miss.</text>

  <line x1="1154" y1="454" x2="1186" y2="454" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Card 4 -->
  <rect x="1190" y="338" width="338" height="232" rx="12" fill="#122033" stroke="#2A4561" stroke-width="1.5"/>
  <circle cx="1230" cy="382" r="21" fill="#06B6D4"/>
  <text x="1230" y="389" fill="#050B14" font-size="20" font-weight="700" text-anchor="middle">4</text>
  <text x="1264" y="389" fill="#E2E8F0" font-size="21" font-weight="600">The simulation</text>
  <text x="1214" y="430" fill="#06B6D4" font-size="12.5" letter-spacing="1.2">BEFORE DEPLOY</text>
  <text x="1214" y="464" fill="#94A3B8" font-size="16">Run the new version against</text>
  <text x="1214" y="488" fill="#94A3B8" font-size="16">hundreds of stand-in customers</text>
  <text x="1214" y="512" fill="#94A3B8" font-size="16">before a real one meets it.</text>

  <!-- Timeline of when each check runs -->
  <line x1="56" y1="678" x2="1528" y2="678" stroke="#2A4561" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="56" y="668" fill="#94A3B8" font-size="13" letter-spacing="1.5">WHEN EACH CHECK RUNS</text>
  <circle cx="225" cy="678" r="4" fill="#94A3B8"/>
  <circle cx="603" cy="678" r="4" fill="#94A3B8"/>
  <circle cx="981" cy="678" r="4" fill="#94A3B8"/>
  <circle cx="1359" cy="678" r="4" fill="#94A3B8"/>
  <text x="414" y="708" fill="#94A3B8" font-size="16" text-anchor="middle">while the customer waits</text>
  <text x="981" y="708" fill="#94A3B8" font-size="16" text-anchor="middle">after it has shipped</text>
  <text x="1359" y="708" fill="#94A3B8" font-size="16" text-anchor="middle">before the next release</text>
</svg>
