<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-gp" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="1020" height="560" rx="12" fill="#050B14"/>
  <text x="510" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">Inference With Receipts</text>
  <text x="510" y="54" text-anchor="middle" font-size="11" fill="#94A3B8">Four guardrails turn a probabilistic field into a defensible data product.</text>

  <rect x="40" y="86" width="380" height="140" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="56" y="112" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">GUARDRAIL 1</text>
  <text x="56" y="136" font-size="13" font-weight="700" fill="#E2E8F0">Behavioural feature design</text>
  <text x="56" y="162" font-size="10" fill="#E2E8F0">Features are derived attributes</text>
  <text x="56" y="176" font-size="10" fill="#E2E8F0">over a content catalog, not raw</text>
  <text x="56" y="190" font-size="10" fill="#E2E8F0">event aggregations.</text>
  <text x="56" y="212" font-size="9" fill="#94A3B8">Receipt: the feature that drove the prediction</text>

  <rect x="600" y="86" width="380" height="140" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="616" y="112" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">GUARDRAIL 2</text>
  <text x="616" y="136" font-size="13" font-weight="700" fill="#E2E8F0">Validation that does not pretend</text>
  <text x="616" y="162" font-size="10" fill="#E2E8F0">Segment consistency, cohort and</text>
  <text x="616" y="176" font-size="10" fill="#E2E8F0">time stability, re-score stability.</text>
  <text x="616" y="190" font-size="10" fill="#E2E8F0">Three production-context checks.</text>
  <text x="616" y="212" font-size="9" fill="#94A3B8">Receipt: predictions hold across cycles</text>

  <rect x="260" y="252" width="500" height="120" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="2"/>
  <text x="510" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#06B6D4">The Inference Contract</text>
  <text x="510" y="302" text-anchor="middle" font-size="10" fill="#22D3EE">prediction</text>
  <text x="510" y="320" text-anchor="middle" font-size="10" fill="#22D3EE">is_inferred (boolean marker)</text>
  <text x="510" y="338" text-anchor="middle" font-size="10" fill="#22D3EE">confidence_score</text>
  <text x="510" y="358" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">Every downstream consumer reads all three columns or none</text>

  <rect x="40" y="398" width="380" height="140" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="56" y="424" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">GUARDRAIL 3</text>
  <text x="56" y="448" font-size="13" font-weight="700" fill="#E2E8F0">Explicit-label contracts</text>
  <text x="56" y="474" font-size="10" fill="#E2E8F0">Every downstream table carries</text>
  <text x="56" y="488" font-size="10" fill="#E2E8F0">is_inferred + confidence_score.</text>
  <text x="56" y="502" font-size="10" fill="#E2E8F0">Mark it inferred on every table.</text>
  <text x="56" y="524" font-size="9" fill="#94A3B8">Receipt: the inferred field is never read alone</text>

  <rect x="600" y="398" width="380" height="140" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="616" y="424" font-size="10" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">GUARDRAIL 4</text>
  <text x="616" y="448" font-size="13" font-weight="700" fill="#E2E8F0">Drift monitoring</text>
  <text x="616" y="474" font-size="10" fill="#E2E8F0">Cycle-aware baselines: Ramadan,</text>
  <text x="616" y="488" font-size="10" fill="#E2E8F0">AVOD launches, regional sports</text>
  <text x="616" y="502" font-size="10" fill="#E2E8F0">cycles each compared separately.</text>
  <text x="616" y="524" font-size="9" fill="#94A3B8">Receipt: alerts the team does not mute</text>

  <g stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="4,4">
    <line x1="420" y1="200" x2="280" y2="260" marker-end="url(#arrow-gp)"/>
    <line x1="600" y1="200" x2="740" y2="260" marker-end="url(#arrow-gp)"/>
    <line x1="420" y1="420" x2="280" y2="362" marker-end="url(#arrow-gp)"/>
    <line x1="600" y1="420" x2="740" y2="362" marker-end="url(#arrow-gp)"/>
  </g>
</svg>
