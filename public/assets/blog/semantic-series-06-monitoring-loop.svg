<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-s6" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="940" height="430" rx="12" fill="#050B14"/>
  <text x="470" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">Performance Monitoring Feedback Loop</text>

  <!-- Signal Sources (neutral) -->
  <rect x="45" y="78" width="180" height="150" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="135" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#E2E8F0">Signal Sources</text>
  <g fill="#E2E8F0" font-size="9">
    <text x="60" y="126">- query durations</text>
    <text x="60" y="142">- memory and CPU counters</text>
    <text x="60" y="158">- partition process times</text>
    <text x="60" y="174">- refresh failure events</text>
    <text x="60" y="190">- report metadata</text>
  </g>

  <!-- Monitoring Store (neutral) -->
  <rect x="270" y="78" width="180" height="150" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="360" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#E2E8F0">Monitoring Store</text>
  <g fill="#E2E8F0" font-size="9">
    <text x="285" y="126">- metrics tables</text>
    <text x="285" y="142">- partition metadata</text>
    <text x="285" y="158">- historical baselines</text>
    <text x="285" y="174">- SLA thresholds</text>
    <text x="285" y="190">- ownership mapping</text>
  </g>

  <!-- Hero: Detection Layer -->
  <rect x="495" y="78" width="180" height="150" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="585" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#06B6D4">Detection Layer</text>
  <g fill="#06B6D4" font-size="9">
    <text x="510" y="126">- anomaly checks</text>
    <text x="510" y="142">- failed refresh alerts</text>
    <text x="510" y="158">- slow query alerts</text>
    <text x="510" y="174">- capacity trend flags</text>
    <text x="510" y="190">- stale partition checks</text>
  </g>

  <!-- Optimization Actions (neutral terminal) -->
  <rect x="720" y="78" width="180" height="150" rx="10" fill="#122033" stroke="#06B6D4" stroke-width="2"/>
  <text x="810" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#E2E8F0">Optimization Actions</text>
  <g fill="#06B6D4" font-size="9">
    <text x="735" y="126">- tune DAX measures</text>
    <text x="735" y="142">- adjust partition windows</text>
    <text x="735" y="158">- optimize relationships</text>
    <text x="735" y="174">- reduce heavy visuals</text>
    <text x="735" y="190">- update runbook controls</text>
  </g>

  <g stroke="#06B6D4">
    <line x1="225" y1="153" x2="270" y2="153" stroke-width="2.5" marker-end="url(#arrow-s6)"/>
    <line x1="450" y1="153" x2="495" y2="153" stroke-width="2.5" marker-end="url(#arrow-s6)"/>
    <line x1="675" y1="153" x2="720" y2="153" stroke-width="2.5" marker-end="url(#arrow-s6)"/>
  </g>

  <!-- Feedback loop: Optimization Actions back into Signal Sources.
       Explicit attachment at both ends so the curve clearly connects the boxes. -->
  <path d="M810 228 L 810 252 C 810 298, 130 298, 130 252 L 130 232" fill="none" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-s6)"/>
  <text x="470" y="282" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">feedback loop</text>
  <text x="470" y="322" text-anchor="middle" font-size="10" fill="#06B6D4">Monitoring is effective only when it drives action and model improvement</text>

  <rect x="140" y="345" width="660" height="48" rx="8" fill="#0A1220" stroke="#2A4561"/>
  <text x="470" y="366" text-anchor="middle" font-size="10" fill="#E2E8F0">Practical outputs: query SLA dashboard, incident tracker, weekly optimization review</text>
  <text x="470" y="382" text-anchor="middle" font-size="9" fill="#94A3B8">This is how semantic layer operations move from reactive firefighting to planned reliability</text>
</svg>
