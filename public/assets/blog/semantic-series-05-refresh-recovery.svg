<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-s5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="940" height="430" rx="12" fill="#050B14"/>
  <text x="470" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">Refresh Pipeline and Recovery Workflow</text>

  <!-- Hero: Normal daily refresh path -->
  <rect x="40" y="100" width="860" height="126" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="470" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#06B6D4">Normal Daily Refresh Path</text>

  <g fill="#122033" stroke="#06B6D4">
    <rect x="70" y="145" width="120" height="58" rx="8"/>
    <rect x="220" y="145" width="120" height="58" rx="8"/>
    <rect x="370" y="145" width="120" height="58" rx="8"/>
    <rect x="520" y="145" width="120" height="58" rx="8"/>
    <rect x="670" y="145" width="120" height="58" rx="8"/>
  </g>
  <g fill="#06B6D4" font-size="9" text-anchor="middle">
    <text x="130" y="169">Upstream Data</text>
    <text x="130" y="184">Jobs Complete</text>
    <text x="280" y="169">Load Staging</text>
    <text x="280" y="184">Tables</text>
    <text x="430" y="169">Create Partitions</text>
    <text x="430" y="184">for Fact Tables</text>
    <text x="580" y="169">Model Refresh</text>
    <text x="580" y="184">and Processing</text>
    <text x="730" y="169">Partition Merge</text>
    <text x="730" y="184">and Cleanup</text>
  </g>

  <g stroke="#06B6D4">
    <line x1="190" y1="174" x2="220" y2="174" stroke-width="2.5" marker-end="url(#arrow-s5)"/>
    <line x1="340" y1="174" x2="370" y2="174" stroke-width="2.5" marker-end="url(#arrow-s5)"/>
    <line x1="490" y1="174" x2="520" y2="174" stroke-width="2.5" marker-end="url(#arrow-s5)"/>
    <line x1="640" y1="174" x2="670" y2="174" stroke-width="2.5" marker-end="url(#arrow-s5)"/>
  </g>

  <!-- Neutral: Missed-day recovery path -->
  <rect x="40" y="250" width="860" height="142" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="470" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="#E2E8F0">Missed-Day Recovery Path</text>

  <g fill="#122033" stroke="#2A4561">
    <rect x="70" y="295" width="250" height="72" rx="8"/>
    <rect x="345" y="295" width="250" height="72" rx="8"/>
    <rect x="620" y="295" width="250" height="72" rx="8"/>
  </g>
  <g fill="#E2E8F0" font-size="9">
    <text x="86" y="319">1. Confirm upstream dependencies are complete</text>
    <text x="86" y="335">2. Backfill missing date range in staging loads</text>
    <text x="86" y="351">3. Validate row counts before model processing</text>
    <text x="361" y="319">4. Reset last-partition pointer metadata safely</text>
    <text x="361" y="335">5. Recreate only impacted fact partitions</text>
    <text x="361" y="351">6. Process model and rerun validation suite</text>
    <text x="636" y="319">7. Check dashboard deltas against baseline</text>
    <text x="636" y="335">8. Publish incident note and prevention action</text>
    <text x="636" y="351">9. Resume standard incremental schedule</text>
  </g>
</svg>
