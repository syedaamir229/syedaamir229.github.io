<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 380" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow-bim" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="1020" height="380" rx="12" fill="#050B14"/>
  <text x="510" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#E2E8F0">The Three-Phase Migration Sequence</text>
  <text x="510" y="52" text-anchor="middle" font-size="11" fill="#94A3B8">Swap one layer at a time. When the number moves, you can always point at the layer that changed.</text>

  <rect x="30" y="84" width="290" height="180" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="48" y="110" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">PHASE 1</text>
  <text x="48" y="138" font-size="14" font-weight="700" fill="#E2E8F0">Tool</text>
  <text x="48" y="170" font-size="10" fill="#E2E8F0">Move report consumers to</text>
  <text x="48" y="184" font-size="10" fill="#E2E8F0">the target BI tool. Same</text>
  <text x="48" y="198" font-size="10" fill="#E2E8F0">legacy data underneath.</text>
  <text x="48" y="222" font-size="9" fill="#94A3B8">Variable changed: rendering</text>
  <text x="48" y="236" font-size="9" fill="#94A3B8">Trust impact: contained</text>

  <line x1="320" y1="174" x2="365" y2="174" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-bim)"/>

  <rect x="365" y="84" width="290" height="180" rx="10" fill="#0A1220" stroke="#2A4561"/>
  <text x="383" y="110" font-size="11" font-weight="700" fill="#94A3B8" font-family="JetBrains Mono, monospace">PHASE 2</text>
  <text x="383" y="138" font-size="14" font-weight="700" fill="#E2E8F0">Data layer</text>
  <text x="383" y="170" font-size="10" fill="#E2E8F0">Repoint reports to governed</text>
  <text x="383" y="184" font-size="10" fill="#E2E8F0">tables from the enterprise</text>
  <text x="383" y="198" font-size="10" fill="#E2E8F0">data model. Metric logic stays.</text>
  <text x="383" y="222" font-size="9" fill="#94A3B8">Variable changed: data source</text>
  <text x="383" y="236" font-size="9" fill="#94A3B8">Trust impact: traceable</text>

  <line x1="655" y1="174" x2="700" y2="174" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrow-bim)"/>

  <rect x="700" y="84" width="290" height="180" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="718" y="110" font-size="11" font-weight="700" fill="#06B6D4" font-family="JetBrains Mono, monospace">PHASE 3</text>
  <text x="718" y="138" font-size="14" font-weight="700" fill="#06B6D4">Metric logic</text>
  <text x="718" y="170" font-size="10" fill="#E2E8F0">Centralise KPI logic in shared</text>
  <text x="718" y="184" font-size="10" fill="#E2E8F0">semantic-layer measures.</text>
  <text x="718" y="198" font-size="10" fill="#E2E8F0">Report owners select, not author.</text>
  <text x="718" y="222" font-size="9" fill="#22D3EE">Variable changed: KPI definitions</text>
  <text x="718" y="236" font-size="9" fill="#22D3EE">Trust impact: durable governance</text>

  <rect x="30" y="290" width="960" height="68" rx="10" fill="rgba(6,182,212,0.06)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="510" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#06B6D4">When the number moves, the team can always point at the layer that changed</text>
  <text x="510" y="338" text-anchor="middle" font-size="10" fill="#94A3B8">A big-bang migration is a three-variable reconciliation. A phased migration is a one-variable diagnosis.</text>
</svg>
