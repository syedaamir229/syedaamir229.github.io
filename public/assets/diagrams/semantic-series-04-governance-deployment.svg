<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f9b8e"/>
    </marker>
  </defs>

  <rect width="960" height="430" rx="12" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Governance and Deployment Control Flow</text>

  <rect x="45" y="92" width="150" height="78" rx="9" fill="#f5f6fa" stroke="#d8dbe6"/>
  <text x="120" y="120" text-anchor="middle" font-size="10" fill="#1a1a2e">Change Request</text>
  <text x="120" y="138" text-anchor="middle" font-size="9" fill="#7b8096">new KPI or logic update</text>

  <rect x="235" y="92" width="150" height="78" rx="9" fill="#eef9f7" stroke="#9ed9d2"/>
  <text x="310" y="120" text-anchor="middle" font-size="10" fill="#0a7a6f">Dev Model Update</text>
  <text x="310" y="138" text-anchor="middle" font-size="9" fill="#7b8096">table, measure, role edits</text>

  <rect x="425" y="92" width="150" height="78" rx="9" fill="#eef9f7" stroke="#9ed9d2"/>
  <text x="500" y="120" text-anchor="middle" font-size="10" fill="#0a7a6f">Validation Gate</text>
  <text x="500" y="138" text-anchor="middle" font-size="9" fill="#7b8096">QA checks and peer review</text>

  <rect x="615" y="92" width="150" height="78" rx="9" fill="#eef9f7" stroke="#9ed9d2"/>
  <text x="690" y="120" text-anchor="middle" font-size="10" fill="#0a7a6f">Deployment Wizard</text>
  <text x="690" y="138" text-anchor="middle" font-size="9" fill="#7b8096">retain partitions and roles</text>

  <rect x="805" y="92" width="110" height="78" rx="9" fill="#1a1a2e" stroke="#0f9b8e" stroke-width="2"/>
  <text x="860" y="120" text-anchor="middle" font-size="10" fill="#ffffff">Prod Model</text>
  <text x="860" y="138" text-anchor="middle" font-size="9" fill="#16c2b0">published</text>

  <line x1="195" y1="131" x2="235" y2="131" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <line x1="385" y1="131" x2="425" y2="131" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <line x1="575" y1="131" x2="615" y2="131" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow4)"/>
  <line x1="765" y1="131" x2="805" y2="131" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow4)"/>

  <rect x="120" y="230" width="720" height="150" rx="10" fill="#fdfdfd" stroke="#d8dbe6"/>
  <text x="480" y="257" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Governance Rules That Prevent Reporting Drift</text>

  <rect x="150" y="278" width="200" height="76" rx="8" fill="#ffffff" stroke="#d8dbe6"/>
  <text x="166" y="301" font-size="9" fill="#1a1a2e">1. Definition ownership by metric domain</text>
  <text x="166" y="317" font-size="9" fill="#1a1a2e">2. Versioned change log per KPI</text>
  <text x="166" y="333" font-size="9" fill="#1a1a2e">3. Mandatory validation checklist</text>

  <rect x="380" y="278" width="200" height="76" rx="8" fill="#ffffff" stroke="#d8dbe6"/>
  <text x="396" y="301" font-size="9" fill="#1a1a2e">4. Partition impact review per release</text>
  <text x="396" y="317" font-size="9" fill="#1a1a2e">5. Security role review for access scope</text>
  <text x="396" y="333" font-size="9" fill="#1a1a2e">6. Backout plan before deployment</text>

  <rect x="610" y="278" width="200" height="76" rx="8" fill="#ffffff" stroke="#d8dbe6"/>
  <text x="626" y="301" font-size="9" fill="#1a1a2e">7. Smoke test on high-value dashboards</text>
  <text x="626" y="317" font-size="9" fill="#1a1a2e">8. Publish release note for business users</text>
  <text x="626" y="333" font-size="9" fill="#1a1a2e">9. Confirm refresh completion post release</text>
</svg>
