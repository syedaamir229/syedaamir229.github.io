<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f9b8e"/>
    </marker>
  </defs>

  <rect width="920" height="420" rx="12" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">KPI Engineering Stack in a Semantic Model</text>

  <rect x="50" y="92" width="240" height="270" rx="10" fill="#f5f6fa" stroke="#d8dbe6"/>
  <text x="170" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Base Measures</text>
  <rect x="68" y="136" width="204" height="34" rx="6" fill="#ffffff" stroke="#d8dbe6"/><text x="86" y="157" font-size="9" fill="#1a1a2e">plays = SUM(fact_engagement[play_count])</text>
  <rect x="68" y="180" width="204" height="34" rx="6" fill="#ffffff" stroke="#d8dbe6"/><text x="86" y="201" font-size="9" fill="#1a1a2e">watchers = DISTINCTCOUNT(subscriber_id)</text>
  <rect x="68" y="224" width="204" height="34" rx="6" fill="#ffffff" stroke="#d8dbe6"/><text x="86" y="245" font-size="9" fill="#1a1a2e">revenue = SUM(fact_subscriptions[amount])</text>
  <rect x="68" y="268" width="204" height="34" rx="6" fill="#ffffff" stroke="#d8dbe6"/><text x="86" y="289" font-size="9" fill="#1a1a2e">ad_fill_rate = DIVIDE(impressions, requests)</text>

  <line x1="290" y1="226" x2="360" y2="226" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow3)"/>

  <rect x="360" y="72" width="200" height="310" rx="10" fill="#eef9f7" stroke="#9ed9d2"/>
  <text x="460" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#0a7a6f">Business Measures</text>
  <rect x="378" y="116" width="164" height="34" rx="6" fill="#ffffff" stroke="#9ed9d2"/><text x="396" y="137" font-size="9" fill="#0a7a6f">net_adds = new_subs - churned_subs</text>
  <rect x="378" y="160" width="164" height="34" rx="6" fill="#ffffff" stroke="#9ed9d2"/><text x="396" y="181" font-size="9" fill="#0a7a6f">churn_rate = DIVIDE(churned, opening_base)</text>
  <rect x="378" y="204" width="164" height="34" rx="6" fill="#ffffff" stroke="#9ed9d2"/><text x="396" y="225" font-size="9" fill="#0a7a6f">arpu = DIVIDE(revenue, avg_active_base)</text>
  <rect x="378" y="248" width="164" height="34" rx="6" fill="#ffffff" stroke="#9ed9d2"/><text x="396" y="269" font-size="9" fill="#0a7a6f">retention = DIVIDE(retained, cohort_size)</text>
  <rect x="378" y="292" width="164" height="34" rx="6" fill="#ffffff" stroke="#9ed9d2"/><text x="396" y="313" font-size="9" fill="#0a7a6f">engagement_index = weighted score</text>

  <line x1="560" y1="226" x2="630" y2="226" stroke="#0f9b8e" stroke-width="2.5" marker-end="url(#arrow3)"/>

  <rect x="630" y="92" width="240" height="270" rx="10" fill="#1a1a2e" stroke="#0f9b8e" stroke-width="2"/>
  <text x="750" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Consumption Layer</text>
  <rect x="648" y="136" width="204" height="34" rx="6" fill="#2a2a4e" stroke="#0f9b8e"/><text x="666" y="157" font-size="9" fill="#16c2b0">time intelligence: MTD, QTD, YTD</text>
  <rect x="648" y="180" width="204" height="34" rx="6" fill="#2a2a4e" stroke="#0f9b8e"/><text x="666" y="201" font-size="9" fill="#16c2b0">lifecycle cuts: new, churned, reactivated</text>
  <rect x="648" y="224" width="204" height="34" rx="6" fill="#2a2a4e" stroke="#0f9b8e"/><text x="666" y="245" font-size="9" fill="#16c2b0">field parameters for self service</text>
  <rect x="648" y="268" width="204" height="34" rx="6" fill="#2a2a4e" stroke="#0f9b8e"/><text x="666" y="289" font-size="9" fill="#16c2b0">report templates with approved KPIs</text>

  <text x="460" y="400" text-anchor="middle" font-size="10" fill="#7b8096">Measure logic is authored once and reused everywhere</text>
</svg>
